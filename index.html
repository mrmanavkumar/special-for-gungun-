<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special For Gungun ❤️</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

    <div class="stars"></div>
    <canvas id="effectCanvas"></canvas>

    <!-- Audios (Dono Files Aapki) -->
    <audio id="countdownAudio" src="countdown.mp3"></audio>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio> <!-- Naya Romantic Song -->

    <div class="container">
        
        <!-- STEP 1: Gift Box -->
        <div id="giftSection" class="gift-box-container">
            <div class="gift-circle-bg">
                <img src="gift.png" alt="Gift" id="giftBox" class="gift-img" onclick="startSequence()">
            </div>
            <p class="tap-text">Tap to Open 🎁</p>
        </div>

        <!-- STEP 2: Countdown Screen -->
        <div id="countdownScreen" class="hidden">
            <div id="countdownNumber">3</div>
        </div>

        <!-- STEP 3: Happy Birthday Screen -->
        <div id="bdayGreetingScreen" class="hidden">
            <h1 class="bday-text">HAPPY<br>BIRTHDAY! 🎂</h1>
        </div>

        <!-- STEP 4: Template -->
        <div id="templateSection" class="hidden template-wrapper">
            <img src="birthday-template.png" alt="Template" class="template-img">
        </div>

        <!-- STEP 5: Message (Typewriter & Watermark Fixed) -->
        <div id="messageSection" class="hidden scroll-letter">
            <!-- Sketch Watermark Background -->
            <div class="watermark-bg">
                <img src="sketch.png" alt="Sketch">
            </div>
            <!-- Is container ke andar text automatic typewriter se likhega -->
            <div id="typewriterText" class="letter-text"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
