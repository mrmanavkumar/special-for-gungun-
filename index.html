<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Gungun ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

    <!-- Gift Screen -->
    <div class="gift-container">

        <div class="gift-box" onclick="openGift()">
            <img src="gift.png" alt="Gift">
        </div>

        <h2 class="tap-text">
            🎁 Tap The Gift 🎁
        </h2>

    </div>

    <!-- Countdown -->
    <div id="countdownScreen">

        <h1 id="countdownText">
            3
        </h1>

    </div>

    <!-- Birthday Screen -->
    <div id="surprise">

        <img
            src="birthday-template.png"
            class="birthday-template"
            alt="Birthday">

    </div>

    <!-- Letter Screen -->
    <div id="finalMessage">

        <!-- Sketch Watermark -->
        <img
            src="sketch.png"
            class="watermark"
            alt="Sketch">

        <div class="letter-card">

            <h1>
                ❤️ Happy Birthday Gungun ❤️
            </h1>

            <div id="messageText"></div>

        </div>

    </div>
    <!-- Audio -->

    <audio id="countdown" preload="auto">
        <source src="countdown.mp3" type="audio/mpeg">
    </audio>

    <audio id="music" preload="auto">
        <source src="birthday.mp3" type="audio/mpeg">
    </audio>

    <!-- Background Effects -->

    <div id="hearts"></div>

    <div id="confetti"></div>

    <!-- JS -->

    <script src="script.js"></script>

</body>
</html>
