<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🌹</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Twinkling Stars Background -->
    <div class="stars"></div>
    <div class="twinkling"></div>

    <!-- Canvas for Rose Petals & Hearts Particle Effect -->
    <canvas id="effectCanvas"></canvas>

    <!-- Main Container -->
    <div class="container">
        
        <!-- STEP 1: The Premium Gift Box -->
        <div id="giftBox" class="gift-box" onclick="openGift()">
            <div class="ribbon"></div>
            <div class="gift-text">Tap to Open Gift 🎁</div>
        </div>

        <!-- STEP 2: The Magical Content (Hidden initially) -->
        <div id="magicalContent" class="hidden">
            <!-- Birthday Image with Smooth Zoom -->
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=500" alt="Birthday Image" class="zoom-image">
            </div>

            <!-- Romantic Sliding Letter Box -->
            <div class="letter-box">
                <div class="letter-content">
                    <h3>Dear [Name], ❤️</h3>
                    <p>Aapke is special din par main bas yeh kehna chahta/chahti hoon ki aap meri zindagi ka sabse khoobsurat hissa ho.</p>
                    <p>May your day be filled with endless love, laughter, and pure happiness. Happy Birthday! 🌹</p>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
