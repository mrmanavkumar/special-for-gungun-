<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Gungun ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

</head>

<body>

<!-- ⭐ Background Stars -->
<div id="stars"></div>

<!-- ❤️ Floating Hearts -->
<div id="hearts"></div>

<!-- 🌹 Rose Petals -->
<div id="roseContainer"></div>

<!-- 🎁 Gift Screen -->
<div id="giftScreen">

    <div id="giftBox" onclick="openGift()">

        <img src="gift.png" alt="Gift">

    </div>

    <h2>🎁 Tap The Gift 🎁</h2>

</div>

<!-- Countdown -->

<div id="countdownScreen">

<h1 id="count">3</h1>

</div>

<!-- Happy Birthday -->

<div id="birthdayText">

<div class="birthdayCard">

<h1>

🎉

<br>

Happy Birthday

<br>

Gungun ❤️

</h1>

</div>

</div>

<!-- Birthday Image -->

<div id="templateScreen">

<img src="birthday-template.png" id="birthdayTemplate">

</div>

<!-- Letter -->

<div id="letterScreen">

<img src="sketch.png" id="watermark">

<div id="letter">

<h1>❤️ Happy Birthday ❤️</h1>

<div id="message"></div>

</div>

</div>

<!-- Music -->

<audio id="music" src="music.mp3"></audio>

<audio id="countdown" src="countdown.mp3"></audio>

<script src="script.js"></script>

</body>

</html>
